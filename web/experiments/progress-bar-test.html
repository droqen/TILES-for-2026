<!DOCTYPE html>
<html>
	<head>
		<title>droqever v2.0beta</title>
		<meta charset="UTF-8">
		<style>
			@font-face {
				font-family: font44mono;
				src: url(font44mono.ttf);
			}

			html, body { margin: 0; background: black; }
			#canvas {
				width: 100vw; height: 100vh; background: black;
			}
			#progress-zone {
				position: absolute;
				width: 60vmin; height:60vmin; margin-left:-30vmin; margin-top:-30vmin; padding: 1px;
				left: 50%; top: 50%;
				background: none; border: none; border-color: rgba(0,0,0,0);
				filter: blur(0.1vmin);
			}
			#progress-count {
				margin-left: 0.1vmin;
				position: absolute; top:0;
				margin-top: -5.4vmin;
				/*margin-top: -6.125vmin;*/
				width: 50vw;
				line-height: 4vmin;
				font-size: 11.95vmin;
				font-family: "font44mono", monospace, sans-serif;
			}
			#progress-bar {
				background-color: #FFF;
				position: relative;
				width: 100%;
				height: 0%;
			}
			#progress-count, #progress-bar {
				color: #FFF;
				transition: background-color 2s ease, color 2s ease;
			}
		</style>
	</head>
	<body>
		<canvas id="canvas" tabindex="0"></canvas>
		<div id="progress-zone"><div id="progress-count"></div><div id="progress-bar"></div></div>
		<script>
			function getRandomPastel() {
				var letters = 'ABCDEF'; // '0123456789ABCDEF';
				var numletters = 6; // 16
				var color = '#';
				for (var i = 0; i < 6; i++) {
					color += letters[Math.floor(Math.random() * numletters)];
				}
				return color;
			}
			function hideProgress() {
				document.getElementById("progress-zone").style.display = "none";
			}
			let p = 0;
			let nextPastel = 0;
			function updateProgress(current, total) {
				console.log(`update ${current}/${total}`);
				if (current>0&&total>0){
					document.getElementById("progress-count").innerText = `LOADING ${(total/1000000.0).toFixed(1)}MB`
					let p2 = Math.ceil(current * 80 / total);
					if (p != p2) {
						p = p2;
						if (p >= nextPastel) {
							nextPastel += 10;
							let c = "#FFF";
							if (nextPastel < 90) {c = getRandomPastel();}
							document.getElementById("progress-bar").style.backgroundColor = c;
							document.getElementById("progress-count").style.color = c;
						}
						let pStr = `${p*1.25}%`;
						console.log(pStr);
						document.getElementById("progress-bar").style.height = pStr;
						console.log(document.getElementById("progress-bar"), document.getElementById("progress-bar").style.height,pStr);
					}
				} else{
					// uncertain what do
					document.getElementById("progress-count").innerText = `LOADING ??.?MB...`
				}
			}
			function displayFailureNotice() {
				console.log("failed");
			}
		</script>
		<script>
			var c = 0;
			var t = 900000;
			setInterval(function () {
				c += 1500;
				if (c<t) {
					updateProgress(c,t);
				} else {
					hideProgress();
				}
			}, 50);
		</script>
		<!-- <script type="text/javascript" src="js/godot_preloader.js"></script> -->
	</body>
</html>
