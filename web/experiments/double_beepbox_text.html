			function togglePlay() {
				for (var i = synths.length - 1; i >= 0; i--) {
					if (synths[i].playing) {
						synths[i].pause();
					} else {
						synths[i].play();
					}
				}
			}
			function updateTempo() {
				for (var i = synths.length - 1; i >= 0; i--) {
					synths[i].song.tempo = document.getElementById("tempoSlider").value;
				}
			}
